<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CBT Exam Mode</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="nav">
  <h3 id="subjectTitle">Exam Mode</h3>
  <div class="timer">⏱ <span id="time">00:00</span></div>
</div>

<div class="exam-container">

  <div class="question-box">
    <h2 id="question">Loading question...</h2>
    <div id="options"></div>
  </div>

  <div class="grid">
    <button class="btn" onclick="prevQ()">Previous</button>
    <button class="btn primary" onclick="nextQ()">Next</button>
    <button class="btn" onclick="submitExam()">Submit</button>
  </div>

</div>

<script src="exam.js"></script>

</body>
</html>
