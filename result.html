<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Exam Result</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="exam-container" style="text-align:center">

  <h2>🎉 Exam Completed</h2>

  <div class="card" style="margin-top:20px">
    <h1 id="score">0</h1>
    <p>Your Score</p>
  </div>

  <div class="card">
    <p id="remark">Loading result...</p>
  </div>

  <button class="btn primary" onclick="goHome()">Go to Dashboard</button>

</div>

<script>
const score = localStorage.getItem("score") || 0;

document.getElementById("score").innerText = score;

let remark = "";

if(score >= 70){
  remark = "🔥 Excellent! You’re ready for the real exam.";
}
else if(score >= 50){
  remark = "👍 Good job! Keep practicing.";
}
else{
  remark = "📚 You need more practice. Don’t give up!";
}

document.getElementById("remark").innerText = remark;

function goHome(){
  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
