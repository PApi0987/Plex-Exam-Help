import { getAuth, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const auth = getAuth();

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
  }
});
<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#4f46e5;
  --bg:#f7f8fc;
  --card:#ffffff;
  --text:#111;
  --muted:#555;
  --border:#e5e7eb;
  --shadow:0 10px 30px rgba(0,0,0,0.06);
  --radius:14px;
}

body{
  margin:0;
  font-family:Inter, sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* BUTTON SYSTEM */
.btn{
  padding:10px 16px;
  border-radius:12px;
  text-decoration:none;
  font-weight:500;
  border:none;
  cursor:pointer;
  transition:0.2s;
  display:inline-block;
}

.primary{
  background:var(--primary);
  color:white;
  box-shadow:0 8px 20px rgba(79,70,229,0.25);
}

.secondary{
  background:white;
  border:1px solid var(--border);
  color:#111;
}

/* CARD SYSTEM */
.card{
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:18px;
}

/* CONTAINER */
.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

/* INPUTS */
input, select{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
  margin-top:8px;
  outline:none;
}
  </style>
  <title>Plex Exam Help - Subjects</title>
</head>
<body>

<h1>📚 Plex Exam Help</h1>

<!-- SUBJECT BUTTONS -->
<button onclick="loadSubject('maths')">Maths</button>
<button onclick="loadSubject('english')">English</button>
<button onclick="loadSubject('biology')">Biology</button>

<hr>

<h2 id="title">Select a subject</h2>
<div id="questions"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBZu6gLeNwi0AcrZlmVdGWxjiNW9gPRb1U",
  authDomain: "plexexamhelp.firebaseapp.com",
  projectId: "plexexamhelp",
  storageBucket: "plexexamhelp.firebasestorage.app",
  messagingSenderId: "707616782385",
  appId: "1:707616782385:web:93aecbcc1ec6dace923d10"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.loadSubject = async function(subject) {
  document.getElementById("title").innerText = subject.toUpperCase() + " Questions 📚";
  document.getElementById("questions").innerHTML = "";

  const snapshot = await getDocs(collection(db, subject));

  snapshot.forEach((doc) => {
    const data = doc.data();

    document.getElementById("questions").innerHTML += `
      <div style="padding:10px; border:1px solid #ccc; margin:10px;">
        <p><b>Q:</b> ${data.question}</p>
        <p><b>A:</b> ${data.answer}</p>
      </div>
    `;
  });
};
</script>

</body>
</html>
