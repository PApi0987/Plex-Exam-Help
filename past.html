<!DOCTYPE html>
<html>
<head>
  <title>Plex Exam Help - Subjects</title>
</head>
<body>

<h1>📚 Plex Exam Help</h1>

<!-- SUBJECT BUTTONS -->
<button onclick="loadSubject('maths')">Maths</button>
<button onclick="loadSubject('english')">English</button>
<button onclick="loadSubject('biology')">Biology</button>

<hr>

<h2 id="title">Select a subject</h2>
<div id="questions"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBZu6gLeNwi0AcrZlmVdGWxjiNW9gPRb1U",
  authDomain: "plexexamhelp.firebaseapp.com",
  projectId: "plexexamhelp",
  storageBucket: "plexexamhelp.firebasestorage.app",
  messagingSenderId: "707616782385",
  appId: "1:707616782385:web:93aecbcc1ec6dace923d10"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.loadSubject = async function(subject) {
  document.getElementById("title").innerText = subject.toUpperCase() + " Questions 📚";
  document.getElementById("questions").innerHTML = "";

  const snapshot = await getDocs(collection(db, subject));

  snapshot.forEach((doc) => {
    const data = doc.data();

    document.getElementById("questions").innerHTML += `
      <div style="padding:10px; border:1px solid #ccc; margin:10px;">
        <p><b>Q:</b> ${data.question}</p>
        <p><b>A:</b> ${data.answer}</p>
      </div>
    `;
  });
};
</script>

</body>
</html>
