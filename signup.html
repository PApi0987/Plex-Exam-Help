<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - Plex Exam Help</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>

<body style="font-family:Inter;background:#f7f8fc;margin:0;">

<div style="display:flex;justify-content:center;align-items:center;height:100vh;">

  <div style="background:white;padding:25px;border-radius:14px;width:340px;box-shadow:0 10px 30px rgba(0,0,0,0.06);">

    <h2 style="text-align:center;">Create Account</h2>

    <input id="email" type="email" placeholder="Email" style="width:100%;padding:12px;margin-top:10px;border-radius:10px;border:1px solid #ddd;">
    
    <input id="password" type="password" placeholder="Password" style="width:100%;padding:12px;margin-top:10px;border-radius:10px;border:1px solid #ddd;">

    <button onclick="signup()" style="width:100%;padding:12px;margin-top:15px;border:none;border-radius:10px;background:#4f46e5;color:white;">
      Sign Up
    </button>

    <p style="text-align:center;margin-top:10px;">
      Already have account? 
      <a href="login.html">Login</a>
    </p>

  </div>

</div>

<script type="module">
import { auth } from "./firebase.js";
import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

window.signup = async function () {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    alert("Fill all fields");
    return;
  }

  try {
    await createUserWithEmailAndPassword(auth, email, password);
    alert("Account created 🎉");
    window.location.href = "dashboard.html";
  } catch (error) {
    alert(error.message);
  }
};
</script>

</body>
</html>
